<svg viewBox="0 0 700 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="550" fill="#f6f8fb"/>
  <rect x="40" y="60" width="620" height="430" rx="14" fill="#ffffff" stroke="#e3e8ef" stroke-width="2"/>
  <!-- world map dots -->
  <g fill="#dfe6ee">
    <circle cx="120" cy="140" r="6"/><circle cx="160" cy="160" r="6"/><circle cx="200" cy="140" r="6"/>
    <circle cx="500" cy="150" r="6"/><circle cx="540" cy="170" r="6"/><circle cx="580" cy="150" r="6"/>
    <circle cx="300" cy="180" r="6"/><circle cx="350" cy="200" r="6"/><circle cx="420" cy="180" r="6"/>
  </g>
  <path d="M160 160 Q300 60 500 150" stroke="#e8762c" stroke-width="2" fill="none" stroke-dasharray="6 6"/>
  <path d="M200 140 Q330 240 540 170" stroke="#0b2545" stroke-width="2" fill="none" stroke-dasharray="6 6"/>
