  </g>
  <rect x="270" y="370" width="60" height="18" rx="9" fill="#1c2733"/>
  <!-- bar chart growth -->
  <g transform="translate(470,360)">
    <rect x="0" y="40" width="20" height="50" fill="#9fb4cd"/>
    <rect x="28" y="20" width="20" height="70" fill="#e8762c"/>
    <rect x="56" y="0" width="20" height="90" fill="#0b2545"/>
