    <rect x="-40" y="14" width="44" height="36" rx="4" fill="#9fb4cd"/>
    <circle cx="0" cy="55" r="13" fill="#1c2733"/>
    <circle cx="70" cy="55" r="13" fill="#1c2733"/>
  </g>
  <!-- title-less waterline -->
  <path d="M0 420 Q40 410 80 420 T160 420 T240 420 T320 420 T400 420 T480 420 T560 420 T640 420 T700 420 V440 H0 Z" fill="#13355f"/>
