<svg viewBox="0 0 700 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="550" fill="#f6f8fb"/>
  <rect x="0" y="400" width="700" height="150" fill="#e3e8ef"/>
  <!-- cold storage unit -->
  <rect x="80" y="100" width="220" height="320" rx="10" fill="#ffffff" stroke="#c4d2e0" stroke-width="3"/>
  <rect x="100" y="120" width="180" height="60" rx="6" fill="#dff3f0"/>
  <text x="190" y="158" text-anchor="middle" font-family="Arial" font-size="22" fill="#0b2545" font-weight="700">2°-8°C</text>
  <rect x="100" y="200" width="80" height="90" rx="6" fill="#9fb4cd"/>
  <rect x="190" y="200" width="80" height="90" rx="6" fill="#e8762c"/>
  <rect x="100" y="300" width="80" height="90" rx="6" fill="#e8762c"/>
  <rect x="190" y="300" width="80" height="90" rx="6" fill="#9fb4cd"/>
  <!-- medicine boxes with cross -->
  <g transform="translate(360,180)">
    <rect width="100" height="80" rx="8" fill="#0b2545"/>
    <rect x="40" y="22" width="20" height="36" fill="#ffffff"/>
    <rect x="22" y="40" width="56" height="20" fill="#ffffff"/>
  </g>
  <g transform="translate(480,180)">
    <rect width="100" height="80" rx="8" fill="#e8762c"/>
    <rect x="40" y="22" width="20" height="36" fill="#ffffff"/>
    <rect x="22" y="40" width="56" height="20" fill="#ffffff"/>
  </g>
  <g transform="translate(360,280)">
    <rect width="100" height="80" rx="8" fill="#9fb4cd"/>
    <rect x="40" y="22" width="20" height="36" fill="#ffffff"/>
    <rect x="22" y="40" width="56" height="20" fill="#ffffff"/>
  </g>
  <g transform="translate(480,280)">
    <rect width="100" height="80" rx="8" fill="#0b2545"/>
    <rect x="40" y="22" width="20" height="36" fill="#ffffff"/>
    <rect x="22" y="40" width="56" height="20" fill="#ffffff"/>
  </g>
  <!-- thermometer icon -->
  <g transform="translate(560,360)">
    <rect x="0" y="0" width="14" height="60" rx="7" fill="#ffffff" stroke="#e8762c" stroke-width="3"/>
    <circle cx="7" cy="66" r="12" fill="#e8762c"/>
  </g>
</svg>
